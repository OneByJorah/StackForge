services:
  # --- J1-NOC Dashboard (optional) ---
  # To enable: docker compose -f docker-compose.yml -f docker-compose.dashboard.yml up -d
  # Read-only monitor. Every service below still exposes its own port/API directly;
  # this container only polls health endpoints and Portainer stats, it never proxies traffic.
  noc-dashboard:
    build:
      context: ./noc-dashboard
      dockerfile: Dockerfile
    container_name: noc-dashboard
    ports:
      - "9500:9500"
    environment:
      POLL_INTERVAL_SECONDS: "${NOC_POLL_INTERVAL:-10}"
      PORTAINER_URL: "${PORTAINER_URL:-}"
      PORTAINER_API_KEY: "${PORTAINER_API_KEY:-}"
      ENABLE_HEADROOM_MONITORING: "${ENABLE_HEADROOM_MONITORING:-false}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9500/api/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
