services:
  # --- Portainer (optional container admin UI) ---
  # Referenced in README.md and scripts/healthcheck.sh but was never actually
  # defined as a service — this fills that gap.
  # To enable: docker compose -f docker-compose.yml -f docker-compose.portainer.yml up -d
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/api/system/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  portainer-data:
