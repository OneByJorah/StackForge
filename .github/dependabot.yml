# =============================================================================
# Dependabot Configuration — StackDeploy
# =============================================================================
version: 2
updates:
  # Docker images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    reviewers:
      - "JorahOne-Services"
    ignore:
      - dependency-name: "searxng/searxng"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "qdrant/qdrant"
        update-types: ["version-update:semver-patch"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"

  # npm (browser-search)
  - package-ecosystem: "npm"
    directory: "/browser-search"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-name: "playwright-core"
        update-types: ["version-update:semver-major"]
