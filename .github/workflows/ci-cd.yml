name: StackDeploy CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker-compose.yml

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          severity: warning

      - name: Run yamllint
        run: |
          pip install yamllint
          yamllint docker-compose.yml .github/workflows/*.yml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - name: Build all services
        run: docker compose build

      - name: Validate compose config
        run: docker compose config -q

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7

      - name: Start stack
        run: |
          cp .env.example .env
          # Set test passwords
          echo "HONCHO_DB_PASSWORD=test123" >> .env
          echo "CAMOFOX_API_KEY=test" >> .env
          echo "CAMOFOX_ADMIN_KEY=test" >> .env
          docker compose up -d

      - name: Wait for services
        run: sleep 30

      - name: Run health check
        run: ./scripts/healthcheck.sh localhost

      - name: Show container status
        run: docker compose ps

      - name: Cleanup
        run: docker compose down -v

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v7

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            cd /path/to/StackDeploy
            git pull origin main
            cp .env.example .env 2>/dev/null || true
            docker compose pull
            docker compose up -d
            ./scripts/healthcheck.sh localhost