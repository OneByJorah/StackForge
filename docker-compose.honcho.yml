services:
  # --- Honcho (optional) ---
  # To enable: docker compose -f docker-compose.yml -f docker-compose.honcho.yml up -d
  # See docs/HONCHO_SETUP.md for full instructions

  honcho-api:
    build:
      context: vendor/honcho
      dockerfile: docker/Dockerfile
    entrypoint: ["sh", "docker/entrypoint.sh"]
    depends_on:
      honcho-db:
        condition: service_healthy
      honcho-redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env.honcho
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://honcho:${HONCHO_DB_PASSWORD:-honcho}@honcho-db:5432/honcho
      - CACHE_ENABLED=true
      - METRICS_ENABLED=false
    volumes:
      - ./honcho/config.toml:/app/config.toml:ro
    restart: unless-stopped

  honcho-db:
    image: pgvector/pgvector:pg15
    container_name: honcho-db
    ports:
      - "127.0.0.1:5432:5432"
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      - POSTGRES_DB=honcho
      - POSTGRES_USER=honcho
      - POSTGRES_PASSWORD=${HONCHO_DB_PASSWORD:-honcho}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - honcho-pgdata:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honcho -d honcho"]
      interval: 5s
      timeout: 5s
      retries: 5

  honcho-redis:
    image: redis:8.2
    container_name: honcho-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - honcho-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  honcho-pgdata:
  honcho-redis-data:
