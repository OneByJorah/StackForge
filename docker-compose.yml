services:
  # --- Search ---
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8080:8080"
    volumes:
      - searxng-data:/etc/searxng
      - ./searxng/settings.yml:/etc/searxng/settings.yml
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # --- Browser automation (browser-search: Camofox) ---
  camofox:
    image: ghcr.io/jo-inc/camofox-browser:latest
    container_name: camofox-browser
    shm_size: 2g
    ports:
      - "9377:9377"
    environment:
      CAMOFOX_API_KEY: ${CAMOFOX_API_KEY:-}
      CAMOFOX_ADMIN_KEY: ${CAMOFOX_ADMIN_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9377/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # --- Notes ---
  obsidian:
    image: sytone/obsidian-remote:latest
    container_name: obsidian
    ports:
      - "8083:8080"
    volumes:
      - ${OBSIDIAN_VAULT_PATH:-./obsidian-vault}:/vaults
    environment:
      FM_HOME: /vaults
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # --- Memory ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

