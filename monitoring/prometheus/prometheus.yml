# =============================================================================
# Prometheus Configuration — StackDeploy
# =============================================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    stack: stackdeploy
    environment: production

# Alerting rules
rule_files:
  - /etc/prometheus/rules/*.yml

# Alertmanager (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus

  # Docker container metrics via cAdvisor
  - job_name: cadvisor
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: project

  # Node metrics (host-level)
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: node-exporter

  # SearXNG
  - job_name: searxng
    metrics_path: /health
    static_configs:
      - targets: ["searxng:8080"]
        labels:
          service: searxng

  # Qdrant
  - job_name: qdrant
    static_configs:
      - targets: ["qdrant:6333"]
        labels:
          service: qdrant

  # Honcho API
  - job_name: honcho
    static_configs:
      - targets: ["honcho:8081"]
        labels:
          service: honcho

  # Camofox
  - job_name: camofox
    static_configs:
      - targets: ["camofox:9377"]
        labels:
          service: camofox

  # Loki (self-monitoring)
  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: loki

  # Grafana
  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          service: grafana
