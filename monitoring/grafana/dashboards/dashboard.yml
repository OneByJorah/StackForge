# =============================================================================
# Grafana Dashboard Provisioning — StackDeploy
# =============================================================================
apiVersion: 1

providers:
  - name: StackDeploy
    orgId: 1
    folder: StackDeploy
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards/json
